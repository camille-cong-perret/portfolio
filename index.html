<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Colonies – Housing in Paris</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --teal:#039191; --teal-dark:#027070;
      --bg:#f8f3eb;
      --filter-bar:#ecddbe;
      --text:#111; --muted:#6b7280;
      --border:#d9cfc0; --white:#fff; --radius:12px;
      --co-bg:#88b0ff;  --co-fg:#111;
      --flat-bg:#ffc9c9;--flat-fg:#111;
      --priv-bg:#e2af41;--priv-fg:#111;
      --xxl-bg:#111;--xxl-fg:#fff;
    }
    html,body{height:100%;overflow:hidden}
    body{font-family:-apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif;
      background:var(--bg);color:var(--text);display:flex;flex-direction:column;font-size:14px}

    /* NAV */
    nav{height:65px;background:var(--bg);border-bottom:1px solid var(--border);
      display:flex;align-items:center;padding:0 28px;gap:28px;flex-shrink:0;z-index:200}
    .site-logo{height:64px;width:auto;display:block}
    .nav-links{display:flex;gap:36px;margin-left:8px}
    .nav-links a{font-size:16px;color:var(--text);text-decoration:none;font-weight:400}
    .nav-links a:hover{opacity:.7}
    .nav-right{margin-left:auto;display:flex;align-items:center;gap:20px;font-size:16px;font-weight:400}
    .nav-right a{color:var(--text);text-decoration:none;display:flex;align-items:center;gap:6px}
    .nav-right svg{width:17px;height:17px}

    /* FILTER BAR */
    .filters{background:var(--filter-bar);border-bottom:1px solid #d6c9a8;
      padding:11px 28px;display:flex;align-items:center;gap:8px;flex-shrink:0}
    /* all controls base – no border by default */
    .filter-btn,.toggle-pill,.filter-date{
      background:var(--white);border:1.5px solid transparent;border-radius:5px;
      height:42px;padding:0 18px;font-size:14px;font-family:inherit;font-weight:700;
      color:var(--text);display:inline-flex;align-items:center;gap:8px;
      white-space:nowrap;cursor:pointer;line-height:1}
    /* only active (City) keeps its border */
    .filter-btn.active{border-color:var(--text);border-width:2.5px}
    .filter-btn svg{width:12px;height:12px;flex-shrink:0}
    .filter-date svg{width:15px;height:15px;flex-shrink:0}
    .toggle-track{width:40px;height:22px;background:#ccc;border-radius:11px;
      position:relative;transition:background .2s;flex-shrink:0}
    .toggle-track.on{background:var(--teal)}
    .toggle-track::after{content:'';position:absolute;width:17px;height:17px;background:white;
      border-radius:50%;top:2.5px;left:2.5px;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:left .2s}
    .toggle-track.on::after{left:20.5px}
    .filter-spacer{flex:1}
    .reset-btn{background:none;border:none;font-size:13.5px;cursor:pointer;
      text-decoration:underline;font-family:inherit;color:var(--text);white-space:nowrap;
      font-weight:700;margin-right:12px}
    .ask-btn{background:var(--teal);color:white;border:none;border-radius:5px;
      height:42px;padding:0 22px;font-size:14px;font-weight:700;font-family:inherit;
      cursor:pointer;display:inline-flex;align-items:center;gap:8px;white-space:nowrap;
      transition:background .15s}
    .ask-btn:hover{background:var(--teal-dark)}
    .ask-btn svg{width:15px;height:15px}

    /* LAYOUT — W131 : listing wider */
    .main{flex:1;display:grid;grid-template-columns:minmax(0,880px) 1fr;overflow:hidden}

    /* LIST PANEL */
    .list-panel{overflow-y:auto;padding:26px 30px 32px;background:var(--bg);display:flex;flex-direction:column}
    .list-panel::-webkit-scrollbar{width:4px}
    .list-panel::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px}
    .list-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px}
    .list-header h1{font-size:46px;font-weight:400;letter-spacing:-.3px}
    .list-header h1 strong{font-weight:800}
    #resultCount{font-size:13.5px;color:var(--text)}
    .badges{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap}
    .feat-badge{display:flex;align-items:center;gap:6px;background:var(--white);
      border-radius:5px;padding:6px 13px;font-size:12px;color:var(--text);font-weight:700}
    .feat-badge svg{width:13px;height:13px}

    /* CARD */
    .card{display:flex;border:none;border-radius:var(--radius);
      overflow:hidden;margin-bottom:16px;background:var(--white);cursor:pointer;
      transition:outline .1s;flex-shrink:0}
    .card:hover{outline:2.5px solid var(--text)}
    .card-img-wrap{width:50%;min-width:0;height:215px;position:relative;
      overflow:hidden;background:#e5e9e4;flex-shrink:0}
    .card-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .3s}
    .avail-badge{position:absolute;top:10px;left:10px;background:white;color:#111;
      font-size:10px;font-weight:700;letter-spacing:.6px;padding:4px 9px;
      border-radius:5px;text-transform:uppercase;border:1px solid #111}
    .open-badge{position:absolute;top:10px;right:10px;background:var(--teal);color:white;
      font-size:10px;font-weight:700;letter-spacing:.5px;padding:4px 9px;
      border-radius:5px;text-transform:uppercase}
    .card-body{padding:18px 22px;flex:1;display:flex;flex-direction:column;justify-content:space-between}
    .card-tags{display:flex;gap:6px;margin-bottom:9px;flex-wrap:wrap;align-items:center}
    .tag{font-size:11.5px;font-weight:600;padding:4px 11px;border-radius:4px;
      display:inline-flex;align-items:center;gap:4px;line-height:1}
    .tag.co  {background:var(--co-bg);  color:var(--co-fg)}
    .tag.flat{background:var(--flat-bg);color:var(--flat-fg)}
    .tag.priv{background:var(--priv-bg);color:var(--priv-fg)}
    .tag.xxl {background:var(--xxl-bg); color:var(--xxl-fg);font-size:11px}
    .tag-help{width:18px;height:18px;border:1.5px solid #111;border-radius:50%;
      display:inline-flex;align-items:center;justify-content:center;
      font-size:11px;font-weight:700;color:#111;cursor:pointer;
      transition:background .15s,color .15s;flex-shrink:0}
    .tag-help:hover{background:#111;color:#fff}

    /* HELP MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);
      z-index:2000;display:flex;align-items:center;justify-content:center;
      padding:24px;opacity:0;pointer-events:none;transition:opacity .2s}
    .modal-overlay.open{opacity:1;pointer-events:auto}
    .modal-box{background:var(--white);border-radius:14px;
      max-width:min(920px,92vw);max-height:calc(100vh - 48px);
      overflow:hidden;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.25);
      display:flex;flex-direction:column;transform:translateY(12px);transition:transform .2s}
    .modal-overlay.open .modal-box{transform:translateY(0)}
    .modal-close{position:absolute;top:14px;right:16px;background:none;border:none;cursor:pointer;
      font-size:22px;line-height:1;color:#111;font-weight:300;z-index:10;padding:4px 8px;border-radius:50%}
    .modal-box img{width:100%;height:100%;object-fit:contain;display:block;border-radius:14px}

    .card-title{font-size:18px;font-weight:700;margin-bottom:5px;line-height:1.2}
    .card-title span{font-weight:400}
    .card-meta{font-size:12.5px;color:var(--text);line-height:1.55}
    .card-price{font-size:15.5px;font-weight:700;text-align:right}
    .card-price .from{font-weight:400}
    .card-price .old{text-decoration:line-through;color:var(--muted);font-weight:400;margin-right:3px}
    .card-price .disc{display:block;font-size:11px;font-weight:400;color:var(--muted);margin-top:2px}

    /* PROMO BLOCKS */
    .promo-block{background:#f2e8d6;border-radius:var(--radius);padding:22px 24px;margin-bottom:16px;flex-shrink:0}
    .promo-features{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
    .promo-item{display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px}
    .promo-icon{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .promo-icon svg{width:30px;height:30px}
    .promo-item p{font-size:12.5px;color:var(--text);line-height:1.45;font-weight:500}
    .promo-steps{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
    .promo-step{display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px}
    .step-icon-wrap{position:relative;display:inline-flex}
    .step-icon-wrap .step-num{position:absolute;top:-4px;right:-4px;width:20px;height:20px;
      background:var(--teal);color:white;border-radius:50%;font-size:10px;font-weight:700;
      display:flex;align-items:center;justify-content:center;border:2px solid var(--bg)}
    .promo-step p{font-size:12.5px;color:var(--text);line-height:1.5}
    .hl-pink{background:#fce7f3;color:#be185d;border-radius:4px;padding:1px 5px;font-weight:600}
    .hl-teal{background:#ccf0eb;color:#0f7a6e;border-radius:4px;padding:1px 5px;font-weight:600}
    .hl-amber{background:#fef3c7;color:#92400e;border-radius:4px;padding:1px 5px;font-weight:600}

    /* NO RESULTS */
    .no-results{text-align:center;padding:56px 24px;color:var(--muted);display:none;font-size:14px;line-height:1.6}

    /* PAGINATION */
    .pagination{display:flex;align-items:center;justify-content:center;gap:6px;padding:20px 0 8px;flex-shrink:0}
    .page-arrow{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text);
      padding:0 6px;line-height:1;font-family:serif;opacity:.6;transition:opacity .15s}
    .page-arrow:hover{opacity:1}
    .page-arrow:disabled{opacity:.2;cursor:default}
    .page-num{background:none;border:1.5px solid transparent;border-radius:50%;
      width:36px;height:36px;font-size:14px;font-weight:500;font-family:inherit;
      cursor:pointer;color:var(--text);transition:all .15s;display:flex;align-items:center;justify-content:center}
    .page-num:hover{border-color:var(--border)}
    .page-num.active{border-color:var(--text);border-width:2px;font-weight:700}

    /* MAP */
    .map-panel{position:relative;overflow:hidden}
    #map{width:100%;height:100%}
    .leaflet-control-zoom{border-radius:8px!important;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.15)!important}
    .leaflet-control-zoom a{width:30px!important;height:30px!important;line-height:30px!important;font-size:16px!important}

    /* MARKERS */
    .marker-wrap{position:relative;display:flex;align-items:center;justify-content:center;overflow:visible}
    .map-dot{width:16px;height:16px;background:var(--teal);border:1px solid white;
      border-radius:50%!important;box-shadow:0 1px 5px rgba(0,0,0,.25);cursor:pointer;
      transition:transform .15s,background .15s,border-color .15s;
      will-change:transform;transform:translateZ(0);backface-visibility:hidden;flex-shrink:0}
    .map-dot.hov{transform:translateZ(0) scale(1.3);background:white;border:2px solid #111!important}
    .map-cluster{background:var(--teal);border:1px solid white;border-radius:50%!important;
      display:flex;align-items:center;justify-content:center;font-weight:700;color:white;
      box-shadow:0 2px 8px rgba(0,0,0,.22);cursor:pointer;
      transition:transform .15s,background .15s,border-color .15s,color .15s;
      will-change:transform;transform:translateZ(0);backface-visibility:hidden;flex-shrink:0}
    .map-cluster.hov{transform:translateZ(0) scale(1.1);background:white;color:#111;border:2px solid #111!important}
    .leaflet-marker-icon{overflow:visible!important;background:none!important;border:none!important}
    .price-tip{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);
      background:#111;color:white;font-size:13px;font-weight:700;padding:6px 12px;
      border-radius:5px;white-space:nowrap;pointer-events:none;
      box-shadow:0 2px 8px rgba(0,0,0,.3);display:none;z-index:20}
    .price-tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);
      border:5px solid transparent;border-top-color:#111}

    /* SEARCH HERE — rectangle br:2 */
    #search-here-btn{position:absolute;top:14px;left:50%;transform:translateX(-50%);
      z-index:1000;background:var(--white);color:var(--text);border:1.5px solid #ccc;
      border-radius:4px;padding:9px 20px;font-size:13px;font-weight:700;font-family:inherit;
      cursor:pointer;display:flex;align-items:center;gap:8px;
      box-shadow:0 3px 14px rgba(0,0,0,.18);
      opacity:0;pointer-events:none;transition:opacity .2s;white-space:nowrap}
    #search-here-btn.visible{opacity:1;pointer-events:auto}
    #search-here-btn:hover{background:var(--teal);color:white;border-color:var(--teal)}
    #search-here-btn svg{width:14px;height:14px;flex-shrink:0}

    /* FILTER BADGE — rectangle br:4 */
    #map-filter-badge{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
      z-index:1000;background:var(--teal);color:white;border-radius:4px;
      padding:7px 14px;font-size:12px;font-weight:600;
      display:flex;align-items:center;gap:7px;
      box-shadow:0 2px 10px rgba(0,0,0,.22);
      opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
    #map-filter-badge.visible{opacity:1;pointer-events:auto}
    #map-filter-badge button{background:rgba(255,255,255,.22);border:none;border-radius:3px;
      color:white;font-size:11px;padding:2px 9px;cursor:pointer;font-family:inherit;font-weight:600}
    #map-filter-badge button:hover{background:rgba(255,255,255,.38)}
    /* MAP POPUP CARD */
    .map-popup{
      position:absolute; top:14px; right:14px;
      width:min(430px, calc(100% - 28px));
      background:var(--white); border-radius:var(--radius);
      box-shadow:0 6px 28px rgba(0,0,0,.22);
      z-index:1001; display:none; overflow:hidden;
      animation:popIn .18s ease;
    }
    @keyframes popIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .map-popup.visible{display:block}
    .mp-img{width:100%;height:210px;position:relative;overflow:hidden;background:#e5e9e4}
    .mp-img img{width:100%;height:100%;object-fit:cover;display:block}
    .mp-body{padding:16px 18px 14px}
    .mp-price{font-size:15px;font-weight:700;text-align:right;margin-top:6px}
    .mp-price .from{font-weight:400}
    .mp-price .old{text-decoration:line-through;color:var(--muted);font-weight:400;margin-right:3px}
    .mp-price .disc{display:block;font-size:11px;font-weight:400;color:var(--muted)}
    .mp-nav{display:flex;align-items:center;justify-content:center;gap:16px;
      padding:10px 0 12px;border-top:1px solid var(--border)}
    .mp-nav button{background:none;border:1px solid var(--border);border-radius:50%;
      width:34px;height:34px;font-size:18px;cursor:pointer;display:flex;align-items:center;
      justify-content:center;color:var(--text);transition:background .12s;line-height:1;
      font-family:serif}
    .mp-nav button:hover{background:var(--bg)}
    .mp-nav button:disabled{opacity:.3;cursor:default}
    .mp-counter{font-size:12px;color:var(--muted);font-weight:500}
  </style>
</head>
<body>

<nav>
  <!-- Set GITHUB constant below, then logo loads automatically -->
  <img id="site-logo" class="site-logo" alt="colonies" src=""/>
  <div class="nav-links">
    <a href="#">Find my home ▾</a>
    <a href="#">Home types ▾</a>
    <a href="#">Corporate offers</a>
    <a href="#">Invest with us ▾</a>
    <a href="#">About us ▾</a>
  </div>
  <div class="nav-right">
    <a href="#"><svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg> EN ▾</a>
    <a href="#"><svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> Login</a>
  </div>
</nav>

<div class="filters">
  <button class="filter-btn active">City <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></button>
  <button class="filter-btn">Price <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></button>
  <button class="filter-btn">Home type <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></button>
  <button class="filter-btn">Capacity <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></button>
  <div class="toggle-pill"><span>Private bathroom</span><div class="toggle-track" id="bathToggle"></div></div>
  <div class="filter-date"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Check-in date</div>
  <div class="filter-spacer"></div>
  <button class="reset-btn" id="resetBtn">Reset all</button>
  <button class="ask-btn"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> Ask for advice</button>
</div>

<div class="main">
  <div class="list-panel" id="listPanel">
    <div class="list-header">
      <h1>Housing in <strong>Paris</strong></h1>
      <span id="resultCount">23 results</span>
    </div>
    <div class="badges" id="badgesRow">
      <span class="feat-badge"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>Fully furnished accommodation</span>
      <span class="feat-badge"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>100% online booking</span>
      <span class="feat-badge"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Medium or long-term rental</span>
    </div>
    <div id="cards"></div>
    <div class="no-results" id="noResults">No properties in this area.<br>Zoom out or pan the map.</div>
    <div class="pagination" id="pagination"></div>
  </div>

  <div class="map-panel">
    <div id="map"></div>

    <!-- MAP LISTING POPUP -->
    <div class="map-popup" id="mapPopup">
      <div class="mp-img">
        <img id="mpImg" src="" alt=""/>
        <span id="mpAvail" class="avail-badge"></span>
      </div>
      <div class="mp-body">
        <div class="card-tags" id="mpTags"></div>
        <div class="card-title" id="mpTitle"></div>
        <div class="card-meta" id="mpMeta"></div>
        <div class="mp-price" id="mpPrice"></div>
      </div>
      <div class="mp-nav" id="mpNav" style="display:none">
        <button id="mpPrev" onclick="mpNavigate(-1)">&#8592;</button>
        <span class="mp-counter" id="mpCounter"></span>
        <button id="mpNext" onclick="mpNavigate(1)">&#8594;</button>
      </div>
    </div>
    <button id="search-here-btn" onclick="searchHere()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Search this area
    </button>
    <div id="map-filter-badge">

    if(used.has(p.id))return;
    const grp=[p];
    props.forEach(q=>{if(q.id===p.id||used.has(q.id))return;if(Math.hypot(p.lat-q.lat,p.lng-q.lng)<thr){grp.push(q);used.add(q.id);}});
    used.add(p.id);
    clusters.push({ids:grp.map(g=>g.id),lat:grp.reduce((s,g)=>s+g.lat,0)/grp.length,lng:grp.reduce((s,g)=>s+g.lng,0)/grp.length,count:grp.length});
  });
  return clusters;
}

/* ═══════════════════════════════════════════════════════
   CARD RENDERING
═══════════════════════════════════════════════════════ */
const typeClass=t=>t==='Coliving'?'co':t==='Flatshare'?'flat':'priv';

function renderCards(){
  const container=document.getElementById('cards');
  const noRes=document.getElementById('noResults');
  const badgesRow=document.getElementById('badgesRow');
  const pagination=document.getElementById('pagination');
  container.innerHTML='';

  let list;
  if(filteredIds){
    // Map filter: show all matched across all pages, no pagination
    list=ALL_PROPERTIES.filter(p=>filteredIds.includes(p.id));
    document.getElementById('resultCount').textContent=`${list.length} results`;
    badgesRow.style.display='none';
    pagination.style.display='none';
  } else {
    list=ALL_PROPERTIES.filter(p=>p.page===currentPage);
    document.getElementById('resultCount').textContent='23 results';
    badgesRow.style.display=currentPage===1?'flex':'none';
    renderPagination();
    pagination.style.display='flex';
  }

  if(!list.length){noRes.style.display='block';return;}
  noRes.style.display='none';

  list.forEach(p=>{
    const perks=p.perks.length?`<br>${p.perks.join(' | ')}`:'' ;
    const price=p.oldPrice
      ?`<span class="old">${p.oldPrice}</span> ${p.price.replace('from ','')} <span class="from">/ month</span><span class="disc">${p.discount}</span>`
      :`${p.price} <span class="from">/ month</span>`;
    const xxlTag=p.xxl?`<span class="tag xxl"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg> XXL building</span>`:'';
    const ob=p.opening?`<span class="open-badge">${p.opening}</span>`:'';

    const d=document.createElement('div');
    d.className='card';d.dataset.id=p.id;
    d.innerHTML=`
      <div class="card-img-wrap">
        <img src="${GITHUB}${p.img}" alt="${p.name}" loading="lazy" onerror="this.style.opacity='.3'"/>
        <span class="avail-badge">${p.avail}</span>${ob}
      </div>
      <div class="card-body">
        <div>
          <div class="card-tags">
            <span class="tag ${typeClass(p.type)}">${p.type}</span>
            ${xxlTag}<span class="tag-help" onclick="event.stopPropagation();openHelpModal()">?</span>
          </div>
          <div class="card-title">${p.name} <span>in ${p.city}</span></div>
          <div class="card-meta">${p.meta}${perks}</div>
        </div>
        <div class="card-price">${price}</div>
      </div>`;
    d.addEventListener('mouseenter',()=>onCardHover(p.id,true));
    d.addEventListener('mouseleave',()=>onCardHover(p.id,false));
    container.appendChild(d);

    // Insert promo block after this card if applicable
    if(PROMO_AFTER_ID[p.id] && !filteredIds){
      const promo=document.createElement('div');
      promo.innerHTML=PROMO_AFTER_ID[p.id]==='features'?promoFeaturesHTML():promoHowItWorksHTML();
      container.appendChild(promo.firstElementChild);
    }
  });
}

function renderPagination(){
  const pg=document.getElementById('pagination');
  pg.innerHTML=`
    <button class="page-arrow" id="prevBtn" ${currentPage===1?'disabled':''}>‹</button>
    ${[1,2,3].map(n=>`<button class="page-num${n===currentPage?' active':''}" onclick="goToPage(${n})">${n}</button>`).join('')}
    <button class="page-arrow" id="nextBtn" ${currentPage===3?'disabled':''}>›</button>`;
  document.getElementById('prevBtn').onclick=()=>goToPage(currentPage-1);
  document.getElementById('nextBtn').onclick=()=>goToPage(currentPage+1);
}

function goToPage(n){
  if(n<1||n>3)return;
  currentPage=n;
  document.getElementById('listPanel').scrollTop=0;
  renderCards();
}

/* ═══════════════════════════════════════════════════════
   MAP INIT
═══════════════════════════════════════════════════════ */
function interp(wpts,step){const pts=[];for(let i=0;i<wpts.length-1;i++){const[y1,x1]=wpts[i],[y2,x2]=wpts[i+1];const d=Math.hypot(y2-y1,x2-x1),n=Math.max(1,Math.round(d/step));for(let j=0;j<n;j++)pts.push([y1+(y2-y1)*j/n,x1+(x2-x1)*j/n]);}pts.push(wpts[wpts.length-1]);return pts;}

function buildLineGroups(){
  Object.entries(LINE_DEFS).forEach(([id,def])=>{
    const grp=L.layerGroup();
    // 1. Coloured polyline
    L.polyline(def.route,{color:def.color,weight:4.5,opacity:.9,lineJoin:'round',lineCap:'round'}).addTo(grp);
    // 2. Dense logo markers every ~1.5km (STEP 0.014°) along the full route
    const pts=interp(def.route, 0.014);
    const sz=def.sz;
    pts.forEach(([lat,lng])=>{
      const el=logoEl(def.label,def.bg,def.fg,def.shape,sz);
      L.marker([lat,lng],{icon:L.divIcon({html:el,className:'',iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]}),interactive:false}).addTo(grp);
    });
    lineGroups[id]=grp;
  });
}

function buildMapMarkers(){
  const clusters=buildClusters(ALL_PROPERTIES);
  clusters.forEach(cl=>{
    const sz=cl.count>1?(cl.count>=6?42:34):13;
    const wrap=document.createElement('div');
    wrap.className='marker-wrap';
    wrap.style.cssText=`width:${sz}px;height:${sz}px;overflow:visible`;

    const prop=ALL_PROPERTIES.find(p=>p.id===cl.ids[0]);
    const tip=document.createElement('div');
    tip.className='price-tip';
    tip.textContent=prop.priceShort;
    wrap.appendChild(tip);

    const dot=document.createElement('div');
    if(cl.count>1){
      dot.className='map-cluster';
      dot.style.cssText=`width:${sz}px;height:${sz}px;min-width:${sz}px;min-height:${sz}px;font-size:${sz>35?15:13}px;border-radius:50%;`;
      dot.textContent=cl.count;
    } else {
      dot.className='map-dot';
      dot.style.borderRadius='50%';
    }
    wrap.appendChild(dot);

    const ico=L.divIcon({html:wrap,className:'',iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});
    const lm=L.marker([cl.lat,cl.lng],{icon:ico}).addTo(map);

    wrap.addEventListener('mouseenter',()=>{
      cl.ids.forEach(id=>onCardHover(id,true,false));
      tip.style.display='block';dot.classList.add('hov');
    });
    wrap.addEventListener('mouseleave',()=>{
      cl.ids.forEach(id=>onCardHover(id,false,false));
      tip.style.display='none';dot.classList.remove('hov');
    });
    lm.on('click',()=>{ showMapPopup(cl.ids, 0); });
    clusterMarkers.push({ids:cl.ids,lm,wrapEl:wrap,dotEl:dot,tipEl:tip});
  });
}

function initMap(){
  map=L.map('map',{center:[48.856,2.347],zoom:11,zoomControl:true});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
    {attribution:'© OpenStreetMap © CartoDB',subdomains:'abcd',maxZoom:19}).addTo(map);
  buildLineGroups();
  buildMapMarkers();
  map.on('moveend zoomend',()=>{clearTimeout(moveTimeout);moveTimeout=setTimeout(showSearchHere,350);});
}

/* ═══════════════════════════════════════════════════════
   HOVER → SHOW TRANSPORT LINES
═══════════════════════════════════════════════════════ */
let activeLines=[];
function onCardHover(propId,on,updateMarker=true){
  const prop=ALL_PROPERTIES.find(p=>p.id===propId);
  if(!prop)return;
  if(on){
    activeLines.forEach(id=>map.removeLayer(lineGroups[id]));
    activeLines=prop.lines||[];
    activeLines.forEach(id=>lineGroups[id]&&lineGroups[id].addTo(map));
  } else {
    activeLines.forEach(id=>map.removeLayer(lineGroups[id]));
    activeLines=[];
  }
  const card=document.querySelector(`.card[data-id="${propId}"]`);
  if(card){card.style.outline=on?'2.5px solid #111':'';}
  if(updateMarker){
    const cm=clusterMarkers.find(c=>c.ids.includes(propId));
    if(cm){cm.dotEl.classList.toggle('hov',on);cm.tipEl.style.display=on?'block':'none';}
  }
}

/* ═══════════════════════════════════════════════════════
   SEARCH HERE
═══════════════════════════════════════════════════════ */
function showSearchHere(){document.getElementById('search-here-btn').classList.add('visible');}
function hideSearchHere(){document.getElementById('search-here-btn').classList.remove('visible');}

function searchHere(){
  hideSearchHere();
  currentBounds=map.getBounds();
  mapFilterActive=true;
  filteredIds=ALL_PROPERTIES.filter(p=>currentBounds.contains(L.latLng(p.lat,p.lng))).map(p=>p.id);
  renderCards();
  updateMarkerVisibility(filteredIds);
  document.getElementById('map-filter-badge').classList.add('visible');
}

function clearMapFilter(){
  mapFilterActive=false;currentBounds=null;filteredIds=null;
  renderCards();
  updateMarkerVisibility(ALL_PROPERTIES.map(p=>p.id));
  document.getElementById('map-filter-badge').classList.remove('visible');
  hideSearchHere();
}

function updateMarkerVisibility(ids){
  clusterMarkers.forEach(cm=>{
    const v=cm.ids.some(id=>ids.includes(id));
    cm.wrapEl.style.opacity=v?'1':'0.2';
    cm.wrapEl.style.filter=v?'':'grayscale(1)';
  });
}

/* ═══════════════════════════════════════════════════════
   MAP POPUP
═══════════════════════════════════════════════════════ */
let mpIds=[], mpIdx=0;

function showMapPopup(ids, idx){
  mpIds=ids; mpIdx=idx;
  renderMapPopup();
  document.getElementById('mapPopup').classList.add('visible');
}

function hideMapPopup(){
  document.getElementById('mapPopup').classList.remove('visible');
}

function mpNavigate(dir){
  mpIdx = (mpIdx + dir + mpIds.length) % mpIds.length;
  renderMapPopup();
}

function renderMapPopup(){
  const p = ALL_PROPERTIES.find(x=>x.id===mpIds[mpIdx]);
  if(!p) return;

  // Image
  document.getElementById('mpImg').src = GITHUB + p.img;
  document.getElementById('mpImg').alt = p.name;
  document.getElementById('mpAvail').textContent = p.avail;

  // Tags
  const xxlTag = p.xxl
    ? `<span class="tag xxl"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg> XXL building</span>` : '';
  const typeClass = t => t==='Coliving'?'co':t==='Flatshare'?'flat':'priv';
  document.getElementById('mpTags').innerHTML =
    `<span class="tag ${typeClass(p.type)}">${p.type}</span>${xxlTag}<span class="tag-help" onclick="event.stopPropagation();openHelpModal()">?</span>`;

  // Title
  document.getElementById('mpTitle').innerHTML = `${p.name} <span>in ${p.city}</span>`;

  // Meta
  const perks = p.perks.length ? `<br>${p.perks.join(' | ')}` : '';
  document.getElementById('mpMeta').innerHTML = `${p.meta}${perks}`;

  // Price
  const priceHtml = p.oldPrice
    ? `<span class="old">${p.oldPrice}</span> ${p.price.replace('from ','')} <span class="from">/ month</span><span class="disc">${p.discount}</span>`
    : `${p.price} <span class="from">/ month</span>`;
  document.getElementById('mpPrice').innerHTML = priceHtml;

  // Nav arrows (only for clusters)
  const nav = document.getElementById('mpNav');
  if(mpIds.length > 1){
    nav.style.display = 'flex';
    document.getElementById('mpCounter').textContent = `${mpIdx+1} / ${mpIds.length}`;
    document.getElementById('mpPrev').disabled = false;
    document.getElementById('mpNext').disabled = false;
  } else {
    nav.style.display = 'none';
  }
}

// Close popup when clicking on map background
document.addEventListener('DOMContentLoaded', ()=>{
  document.getElementById('map').addEventListener('click', e=>{
    if(e.target.closest('.marker-wrap')) return;
    hideMapPopup();
  });
});


function openHelpModal(){document.getElementById('helpModal').classList.add('open');}
function closeHelpModal(e){
  if(e===null||e.target===document.getElementById('helpModal'))
    document.getElementById('helpModal').classList.remove('open');
}
document.getElementById('bathToggle').addEventListener('click',function(){this.classList.toggle('on');});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeHelpModal(null);});
document.getElementById('resetBtn').addEventListener('click',clearMapFilter);

renderCards();
initMap();
</script>
</body>
